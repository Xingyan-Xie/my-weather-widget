<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Tech Assessment 1</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Dynamic Gradient Background */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }

        /* Search Bar Styles */
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #city-input {
            padding: 14px 22px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            width: 70%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        #city-input:focus {
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transform: scale(1.02);
        }

        #search-btn, #location-btn {
            padding: 14px 22px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #search-btn:hover, #location-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* Glassmorphism Weather Card */
        .weather-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .city-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .weather-icon {
            width: 120px;
            height: 120px;
            margin: 15px auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .temperature {
            font-size: 65px;
            font-weight: 300;
            margin: 20px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }

        .weather-desc {
            font-size: 18px;
            text-transform: capitalize;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .weather-details {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 15px;
            min-width: 110px;
            backdrop-filter: blur(5px);
        }

        /* 5-Day Forecast Section */
        .forecast-title {
            font-size: 22px;
            font-weight: 600;
            margin: 30px 0 20px;
            color: white;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .forecast-day {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            transition: transform 0.3s ease;
        }

        .forecast-day:hover {
            transform: translateY(-5px);
        }

        .forecast-day .date {
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.95;
        }

        .forecast-day img {
            width: 60px;
            height: 60px;
            margin: 10px 0;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.15));
        }

        .forecast-day .temp {
            font-size: 18px;
            font-weight: 500;
        }

        .forecast-day .desc {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Error & Loading Messages */
        .error-message {
            color: #ff6b6b;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        .loading {
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .temperature {
                font-size: 45px;
            }
            .city-name {
                font-size: 22px;
            }
            .forecast-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weather App</h1>
        </div>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name, e.g., Shanghai, London, New York">
            <button id="search-btn">Get Weather</button>
            <button id="location-btn">Use My Location</button>
        </div>

        <div id="weather-container">
            <div class="loading">Enter a city name or use your location to start</div>
        </div>
    </div>

    <script>
        const API_KEY = '5fbc8bc590ae855685c7c9d3f3a7f19c';

        // DOM Elements
        const cityInput = document.getElementById('city-input');
        const searchBtn = document.getElementById('search-btn');
        const locationBtn = document.getElementById('location-btn');
        const weatherContainer = document.getElementById('weather-container');
        const body = document.body;

        // Event Listeners
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                getWeatherData(city);
            } else {
                showError('Please enter a city name');
            }
        });

        locationBtn.addEventListener('click', getLocationWeather);

        // Enter key to search
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) {
                    getWeatherData(city);
                } else {
                    showError('Please enter a city name');
                }
            }
        });

        // Change background based on weather condition
        function setBackground(weatherMain) {
            const backgrounds = {
                'Clear': 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'Clouds': 'linear-gradient(135deg, #89ABE3 0%, #CFE8F5 100%)',
                'Rain': 'linear-gradient(135deg, #4B79A1 0%, #283E51 100%)',
                'Snow': 'linear-gradient(135deg, #E6DADA 0%, #274046 100%)',
                'Thunderstorm': 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)',
                'Drizzle': 'linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)'
            };
            body.style.background = backgrounds[weatherMain] || backgrounds['Clear'];
        }

        // Display error message
        function showError(message) {
            weatherContainer.innerHTML = `<div class="error-message">❌ ${message}</div>`;
        }

        // Display loading state
        function showLoading() {
            weatherContainer.innerHTML = `<div class="loading">Fetching weather data...</div>`;
        }

        // Get weather using current location
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            showLoading();
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    getWeatherByCoords(lat, lon);
                },
                (error) => {
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            showError('Location permission denied. Please enter a city manually');
                            break;
                        case error.POSITION_UNAVAILABLE:
                            showError('Location information unavailable. Please enter a city manually');
                            break;
                        case error.TIMEOUT:
                            showError('Location request timed out. Please enter a city manually');
                            break;
                        default:
                            showError('Failed to get location. Please enter a city manually');
                    }
                }
            );
        }

        // Get weather by coordinates
        async function getWeatherByCoords(lat, lon) {
            showLoading();
            try {
                // Get current weather
                const currentRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=en`
                );

                if (!currentRes.ok) throw new Error('Failed to fetch weather data');
                const currentData = await currentRes.json();

                // Get 5-day forecast
                const forecastRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=en`
                );

                if (!forecastRes.ok) throw new Error('Failed to fetch forecast data');
                const forecastData = await forecastRes.json();

                renderWeather(currentData, forecastData);
            } catch (error) {
                handleApiError(error);
            }
        }

        // Get weather by city name
        async function getWeatherData(city) {
            showLoading();
            try {
                // Get current weather
                const currentRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=en`
                );

                if (!currentRes.ok) {
                    if (currentRes.status === 404) throw new Error('City not found. Please check the city name');
                    throw new Error('Failed to fetch weather data');
                }
                const currentData = await currentRes.json();

                // Get 5-day forecast
                const forecastRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric&lang=en`
                );

                if (!forecastRes.ok) throw new Error('Failed to fetch forecast data');
                const forecastData = await forecastRes.json();

                renderWeather(currentData, forecastData);
            } catch (error) {
                handleApiError(error);
            }
        }

        // Handle API errors
        function handleApiError(error) {
            console.error('API Error:', error);
            if (error.message.includes('404') || error.message.includes('City not found')) {
                showError('❌ City not found. Please check the city name');
            } else if (error.message.includes('fetch') || error.message.includes('network')) {
                showError('❌ Network error. Please check your internet connection');
            } else {
                showError(`❌ Failed to get weather: ${error.message}`);
            }
        }

        // Render weather data to the page
        function renderWeather(current, forecast) {
            // Set background based on weather
            setBackground(current.weather[0].main);

            // Process 5-day forecast data (take noon data for each day)
            const dailyForecast = [];
            const dates = new Set();
            for (const item of forecast.list) {
                const date = new Date(item.dt * 1000).toLocaleDateString();
                if (!dates.has(date) && dailyForecast.length < 5) {
                    dates.add(date);
                    dailyForecast.push(item);
                }
            }

            // Render HTML
            weatherContainer.innerHTML = `
                <div class="weather-card">
                    <div class="city-name">${current.name}, ${current.sys.country}</div>
                    <img class="weather-icon" src="https://openweathermap.org/img/wn/${current.weather[0].icon}@2x.png" alt="${current.weather[0].description}">
                    <div class="temperature">${Math.round(current.main.temp)}°C</div>
                    <div class="weather-desc">${current.weather[0].description}</div>
                    <div class="weather-details">
                        <div class="detail-item">Humidity: ${current.main.humidity}%</div>
                        <div class="detail-item">Wind: ${current.wind.speed} m/s</div>
                        <div class="detail-item">Feels like: ${Math.round(current.main.feels_like)}°C</div>
                    </div>
                </div>

                <div class="forecast-title">5-Day Forecast</div>
                <div class="forecast-container">
                    ${dailyForecast.map(day => `
                        <div class="forecast-day">
                            <div class="date">${new Date(day.dt * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                            <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" alt="${day.weather[0].description}">
                            <div class="temp">${Math.round(day.main.temp)}°C</div>
                            <div class="desc">${day.weather[0].description}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
